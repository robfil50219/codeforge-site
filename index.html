<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />

    <title>CodeForge Studio – Moderne frontend, design og webutvikling</title>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <script>
      (function () {
        const STORAGE_KEY = "cfs-theme";
        const root = document.documentElement;
        const meta = document.querySelector('meta[name="color-scheme"]');

        const updateBodyScheme = (mode) => {
          if (document.body) {
            document.body.style.colorScheme = mode;
          } else {
            document.addEventListener(
              "DOMContentLoaded",
              () => {
                document.body && (document.body.style.colorScheme = mode);
              },
              { once: true },
            );
          }
        };

        const apply = (mode, persist) => {
          const normalized = mode === "dark" ? "dark" : "light";
          const isDark = normalized === "dark";
          root.classList.toggle("dark", isDark);
          root.style.colorScheme = normalized;
          if (meta) {
            meta.setAttribute("content", isDark ? "dark light" : "light dark");
          }
          updateBodyScheme(normalized);
          void root.offsetHeight; // force reflow for Safari repaint
          if (persist === true) {
            try {
              localStorage.setItem(STORAGE_KEY, normalized);
            } catch (error) {
              console.warn("Unable to persist theme", error);
            }
          } else if (persist === false) {
            try {
              localStorage.removeItem(STORAGE_KEY);
            } catch (error) {
              console.warn("Unable to clear stored theme", error);
            }
          }
          return normalized;
        };

        try {
          let stored = null;
          try {
            stored = localStorage.getItem(STORAGE_KEY);
          } catch (error) {
            console.warn("Unable to read stored theme", error);
          }
          const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          let initialMode;
          if (stored === "dark" || stored === "light") {
            initialMode = stored;
          } else {
            initialMode = systemPrefersDark ? "dark" : "light";
          }
          apply(initialMode);

          window.__CFS_GET_THEME = () => (root.classList.contains("dark") ? "dark" : "light");
          window.__CFS_SET_THEME = (mode, persist = true) => apply(mode, persist);
        } catch (error) {
          console.warn("Theme preflight failed", error);
        }
      })();
    </script>
  </head>

  <body>
    <!-- App root -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
