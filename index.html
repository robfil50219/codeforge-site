<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>CodeForge Studio – Moderne frontend, design og webutvikling</title>

    <!-- SEO -->
    <meta
      name="description"
      content="CodeForge Studio bygger raske, moderne og visuelt skarpe nettsider med fokus på ytelse, tilgjengelighet og brukervennlighet."
    />
    <meta name="author" content="CodeForge Studio" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:title" content="CodeForge Studio" />
    <meta
      property="og:description"
      content="Moderne frontend, design og webutvikling – raske, brukervennlige og visuelt skarpe løsninger."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://codeforgestudio.no/" />
    <!-- vi bruker bildet du akkurat la i /public -->
    <meta property="og:image" content="https://codeforgestudio.no/image.png" />
    <meta property="og:site_name" content="CodeForge Studio" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CodeForge Studio" />
    <meta
      name="twitter:description"
      content="Moderne frontend, design og webutvikling – raske, brukervennlige og visuelt skarpe løsninger."
    />
    <meta name="twitter:image" content="https://codeforgestudio.no/image.png" />

    <!-- Browser / address bar color -->
    <meta name="theme-color" content="#001920" />

    <!-- Run BEFORE paint: dark mode + ballpit -->
    <script>
      (function () {
        try {
          // theme
          var saved = localStorage.getItem("cf-theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = saved ? saved === "dark" : prefersDark;
          if (dark) {
            document.documentElement.classList.add("dark");
          }

          // ballpit
          var pit = localStorage.getItem("cf-ballpit");
          if (pit === "off") {
            window.__BALLPIT_DISABLED = true;
          }
        } catch (e) {
          /* ignore errors */
        }
      })();
    </script>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
