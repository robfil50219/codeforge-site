<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CodeForge Studio</title>

    <!-- 1. set theme BEFORE css/React -->
    <script>
      (function () {
        try {
          const ls = localStorage.getItem("cf-theme"); // "dark" | "light" | null
          const prefersDark = window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;

          // your default: dark 👍
          const shouldDark = ls ? ls === "dark" : true;

          if (shouldDark || (!ls && prefersDark)) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }

          // background toggle default: ON
          const savedBg = localStorage.getItem("cf-bg-static");
          if (savedBg === "1") {
            window.__BALLPIT_DISABLED = true;
          } else if (savedBg === "0") {
            window.__BALLPIT_DISABLED = false;
          } else {
            // your default: interactive
            window.__BALLPIT_DISABLED = false;
          }
        } catch (e) {
          // ignore
        }
      })();
    </script>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
